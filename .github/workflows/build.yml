name: Build

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            dist: dist
            installer: dist/StarLink Setup*.exe
            artifact_installer: StarLink Installer Windows
            artifact_unpacked: StarLink Unpacked 64bit
            unpacked_path: dist/win-unpacked
          - os: ubuntu-latest
            dist: dist:linux
            installer: dist/StarLink-*.AppImage
            artifact_installer: StarLink Installer Linux

    steps:
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libx11-dev

      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Cache Node Modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn
          key: ${{ runner.os }}-node18-${{ hashFiles('yarn.lock') }}

      - name: Install Dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: yarn install --cache-folder .yarn --network-timeout 100000

      - name: Build App
        run: yarn run ${{ matrix.dist }} --publish never

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_installer }}
          path: ${{ matrix.installer }}
          if-no-files-found: error

      - name: Upload Unpacked
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_unpacked }}
          path: ${{ matrix.unpacked_path }}
