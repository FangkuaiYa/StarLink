name: Comment on pull request

on:
  workflow_run:
    workflows: ['Build']
    types: [completed]

jobs:
  pr_comment:
    name: Add build artifacts to PRs
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get the PR number
        run: |
          PR_RAW=$(curl 'https://api.github.com/search/issues?q=${{ github.event.workflow_run.head_commit.id }}')
          PR_NUM=$(echo $PR_RAW | jq '.items[].number')
          echo "PR_NUM=${PR_NUM}" >> ${GITHUB_ENV}

      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            async function upsertComment(owner, repo, issue_number, purpose, body) {
              const {data: comments} = await github.rest.issues.listComments(
                {owner, repo, issue_number});
              const marker = `<!-- bot: ${purpose} -->`;
              body = marker + "\n" + body;
              const existing = comments.filter((c) => c.body.includes(marker));
              if (existing.length > 0) {
                const last = existing[existing.length - 1];
                core.info(`Updating comment ${last.id}`);
                await github.rest.issues.updateComment({
                  owner, repo,
                  body,
                  comment_id: last.id,
                });
              } else {
                core.info(`Creating a comment in PR ${issue_number}`);
                await github.rest.issues.createComment({issue_number, body, owner, repo});
              }
            }
            const {owner, repo} = context.repo;
            const run_id = '${{github.event.workflow_run.id}}';
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts, {owner, repo, run_id});
            if (!artifacts.length) {
              return core.error('No artifacts found');
            }
            let body = `⭐ **StarLink build artifacts for this PR:**\n`;
            for (const art of artifacts) {
              body += `\n* [${art.name}.zip](https://nightly.link/${owner}/${repo}/actions/artifacts/${art.id}.zip)`;
            }
            body += `\n\n<hr />\n\nArtifacts expire in 90 days. Powered by [nightly.link](https://github.com/oprypin/nightly.link).`;
            await upsertComment(owner, repo, ${{ env.PR_NUM }}, "nightly-link", body);
